source = $HOME/.config/hypr/mocha.conf

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,auto
monitor=eDP-1,1920x1200,0x0,1,bitdepth,10,cm,hdr # Built-in display
monitor=desc:LG Electronics LG ULTRAWIDE 0x00028060,3440x1440,-3440x-600,1,bitdepth,10,cm,hdr # LG Ultrawide
monitor=desc:Dell Inc. DELL P2419H DR79PF3,1920x1080,-3840x-600,1,bitdepth,10 # Dell Monitor L
monitor=desc:Dell Inc. DELL P2419H 1P59PF3,1920x1080,-1920x-600,1,bitdepth,10 # Dell Monitor R

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$flatpakPrefix = /usr/bin/flatpak --socket=wayland run
$flatpakSuffix = --enable-features=UseOzonePlatform --ozone-platform=wayland
$browser = zen
$term = ~/.config/hypr/scripts/ghostty_cwd.sh
$fileManager = dolphin
$menu = vicinae toggle
$music = $flatpakPrefix com.spotify.Client $flatpakSuffix
$phone = $flatpakPrefix org.ferdium.Ferdium $flatpakSuffix
$code = code
$chat = teams-for-linux
$1Password = 1password
$1PasswordQuickAccess = 1password --quick-access
$notes = ~/Applications/Obsidian.AppImage
$swaync = swaync-client -t -sw
$lock = playerctl pause; loginctl lock-session
$showDesktop = ~/.config/hypr/scripts/toggle_show_desktop.sh
$randWall = ~/.config/hypr/scripts/random_wallpaper.sh


#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = hypridle
exec-once = ~/.config/hypr/scripts/random_wallpaper.sh
exec-once = swaync
exec-once = /usr/bin/1password --silent
exec-once = /usr/libexec/pam_kwallet_init
exec-once = /usr/libexec/kf6/polkit-kde-authentication-agent-1
exec-once = fcitx5
exec-once = vicinae server
exec-once = /usr/bin/flatpak run --branch=stable --arch=x86_64 --command=easyeffects com.github.wwmm.easyeffects --gapplication-service

exec = gsettings set org.gnome.desktop.interface gtk-theme "Breeze-Dark"   # for GTK3 apps
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = QT_QPA_PLATFORMTHEME,qt6ct
env = XCURSOR_SIZE,24
env = ELECTRON_OZONE_PLATFORM,wayland
env = HYPRCURSOR_SIZE,24
env = HYPRSHOT_DIR,~/Pictures/Screenshots


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 4
    gaps_out = 8

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = $blue $mauve 45deg
    col.inactive_border = $surface1

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 8
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    # Change the dimming for special workspace
    dim_special = 0.3

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 10
        passes = 3

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,                ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,              1,     10,    default
    animation = border,              1,     5.39,  easeOutQuint
    animation = windows,             1,     4.79,  easeOutQuint
    animation = windowsIn,           1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,          1,     1.49,  linear,       popin 87%
    animation = fadeIn,              1,     1.73,  almostLinear
    animation = fadeOut,             1,     1.46,  almostLinear
    animation = fade,                1,     3.03,  quick
    animation = layers,              1,     3.81,  easeOutQuint
    animation = layersIn,            1,     4,     easeOutQuint, fade
    animation = layersOut,           1,     1.5,   linear,       fade
    animation = fadeLayersIn,        1,     1.79,  almostLinear
    animation = fadeLayersOut,       1,     1.39,  almostLinear
    animation = workspaces,          1,     1.94,  almostLinear, fade
    animation = workspacesIn,        1,     1.21,  almostLinear, fade
    animation = workspacesOut,       1,     1.94,  almostLinear, fade
    animation = specialWorkspace,    1,     1.21,  quick
    animation = specialWorkspaceIn,  1,     4.79,  easeOutQuint, slidefadevert -30%
    animation = specialWorkspaceOut, 1,     1.5,   linear,       slidefadevert -30%
    animation = zoomFactor,          1,     7,     quick
    animation = monitorAdded,        1,     7,     quick
}

# # Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# # "Smart gaps" / "No gaps when only"
# workspace = w[tv1]s[false], gapsout:0, gapsin:0
# workspace = f[1]s[false], gapsout:0, gapsin:0
# windowrule = border_size 0, match:float 0, match:workspace w[tv1]s[false]
# windowrule = rounding 0, match:float 0, match:workspace w[tv1]s[false]
# windowrule = border_size 0, match:float 0, match:workspace f[1]s[false]
# windowrule = rounding 0, match:float 0, match:workspace f[1]s[false]
# Larger gaps for special workspaces
workspace = s[true], gapsout:24, gapsin:8

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
    enable_swallow = true # Allows applications to "swallow" other applications, e.g. a terminal swallowing a launched program.
    swallow_regex = ^(1password|kitty|alacritty|foot|wezterm|ghostty|konsole|org.kde.konsole|xfce4-terminal|gnome-terminal|tilix|foot|alacritty|st|flatpak)$
    focus_on_activate = true # Focus windows when they are activated
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us,us
    kb_variant = ,intl
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =

    repeat_rate = 60
    repeat_delay = 200

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }

    natural_scroll = true
}

gestures {
    workspace_swipe_distance = 100
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 4, horizontal, workspace
gesture = 4, vertical, fullscreen
gesture = 3, swipe, move
gesture = 3, swipe, mod: ALT, resize
gesture = 3, up, mod: SUPER, float
gesture = 3, down, mod: SUPER, close


###################
### KEYBINDINGS ###
###################

binds {
    drag_threshold = 10  # Fire a drag event only after dragging for more than 10px
}

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
$execMod = SUPER SHIFT # Sets "Windows" key as main modifier

# Programs
bind = $execMod, Return, exec, $term
bind = $execMod, A, exec, $term -e zsh -ic opencode
bind = $execMod, B, exec, $browser
bind = $execMod, T, exec, $term -e btm
bind = $execMod, F, exec, $fileManager
bind = $execMod, N, exec, $notes
bind = $execMod, V, exec, $term --workdir ~/projects -e zsh -ic nvim
bind = $execMod, C, exec, $chat
bind = $execMod, M, exec, $music
bind = $execMod, P, exec, $phone
bind = $execMod, W, exec, $randWall
bind = $execMod, Q, exit,

bind = CTRL_SHIFT, space, exec, $1PasswordQuickAccess
bind = $mainMod, Escape, exec, $lock
bind = $mainMod, space, exec, $menu
bind = $mainMod, semicolon, exec, $swaync
bind = $mainMod, D, exec, $showDesktop
bind = $mainMod, Q, killactive,
bind = $mainMod, X, fullscreen,
bind = $mainMod, N, pin, # Pin a window to all workspaces (floating only)
bind = $mainMod, F, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, T, layoutmsg, togglesplit # dwindle

# Screenshot a window
bind = SHIFT, PRINT, exec, hyprshot -m window
# Screenshot a monitor
bind = SUPER, PRINT, exec, hyprshot -m output
# Screenshot a region
bind = , PRINT, exec, hyprshot -m region

# Teams mute/unmute and video on/off with mainMod + mouse buttons 4 and 5 (forward and back)
bind = $mainMod, mouse:275, sendshortcut, [match:class=teams-for-linux] SHIFT CTRL, M, class:teams-for-linux
bind = $mainMod, mouse:276, sendshortcut, [match:class=teams-for-linux] SHIFT CTRL, O, class:teams-for-linux

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Change workspace with mainMod + SHIFT + [comma/period]
bind = $mainMod, comma, workspace, e-1
bind = $mainMod, period, workspace, e+1

# Move windows with mainMod + SHIFT + arrow keys
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Move windows to workspace with mainMod + SHIFT + [comma/period]
bind = $mainMod SHIFT, comma, movetoworkspace, e-1
bind = $mainMod SHIFT, period, movetoworkspace, e+1

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspaces
bind = $mainMod, grave, togglespecialworkspace, ~
bind = $mainMod SHIFT, grave, movetoworkspace, special:~

bind = $mainMod, minus, togglespecialworkspace, -
bind = $mainMod SHIFT, minus, movetoworkspace, special:-

bind = $mainMod, equal, togglespecialworkspace, =
bind = $mainMod SHIFT, equal, movetoworkspace, special:=

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Float/maximize/kill windows with mainMod + LMB/MMB/RMB
bindc = $mainMod, mouse:272, togglefloating
bindc = $mainMod, mouse:274, killactive
bindc = $mainMod, mouse:273, fullscreen

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , switch:Lid Switch, exec, $lock


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful
windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = picture-in-picture
    match:title = Picture-in-Picture
    float = true
    pin = true
    decorate = false
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# Blur vicinae windows
layerrule {
    name = vicinae-blur
    blur = on
    ignore_alpha = 0
    match:namespace = vicinae
}

layerrule {
    name = vicinae-no-animation
    no_anim = on
    match:namespace = vicinae
}

# Blur waybar
layerrule {
    name = waybar-blur
    blur = on
    ignore_alpha = 0.5
    match:namespace = waybar
}
