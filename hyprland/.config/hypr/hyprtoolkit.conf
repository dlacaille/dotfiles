# hyprtoolkit.conf — Catppuccin Mocha
# source mocha.conf first in your hyprland.conf:
source = ~/.config/hypr/mocha.conf

# ── Colors ────────────────────────────────────────────────────────────────────
background  = $base
base        = $surface0
alternate_base = $mantle # alternate background (e.g. for popups, panels)
text        = $text      # primary text
bright_text = $lavender  # highlighted / active text
accent      = $blue      # primary accent (buttons, focus rings)
accent_secondary = $mauve # secondary accent (badges, toggles)

# ── Font sizes ────────────────────────────────────────────────────────────────
h1_size        = 19  # large headings
h2_size        = 15  # section headings
h3_size        = 13  # sub-headings
font_size      = 11  # body text
small_font_size = 10  # captions, labels

# ── Icon theme ────────────────────────────────────────────────────────────────
# Set to whichever icon theme you have installed, e.g.:
# icon_theme = Papirus-Dark
